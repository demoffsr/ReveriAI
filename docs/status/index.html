function deviceSection(title, items, type, color) {
  if (!items || items.length === 0) return `
    <div class="device-section">
      <div class="device-section-title">${title}</div>
      ${emptyHtml('No data available')}
    </div>`;

  const maxCount = Math.max(...items.map(i => i.count), 1);
  const totalCount = items.reduce((s, i) => s + i.count, 0);

  const bars = items.map(item => {
    const label = item.device || item.os_version || item.app_version || item.locale || 'Unknown';
    const pct = Math.round((item.count / totalCount) * 100);
    const barWidth = Math.max((item.count / maxCount) * 100, 3);
    return `<div class="bar-item" onclick="deviceDrilldown('${type}', '${escHtml(label)}')">
      <div class="bar-label">${escHtml(label)}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width: ${barWidth}%; background: ${color};">
          ${barWidth > 15 ? `<span class="bar-fill-text">${item.count}</span>` : ''}
        </div>
      </div>
      <div class="bar-stats">${pct}% &middot; ${item.users}u</div>
    </div>`;
  }).join('');

  return `<div class="device-section">
    <div class="device-section-title">${title}</div>
    <div class="card" style="padding: 0.75rem 1.25rem;">
      <div class="bar-chart">${bars}</div>
    </div>
  </div>`;
}

function deviceDrilldown(type, value) {
  navigate('errors');
}

function setAnalyticsTab(tab) {
  S.analyticsTab = tab;
  const labels = {a_overview:'Overview',a_users:'Users',a_features:'Features',a_dreams:'Dreams',a_heatmap:'Heatmap',a_ai:'AI',a_reminders:'Reminders',a_live:'Live'};
  document.querySelectorAll('.analytics-tabs .filter-pill').forEach(p =>
    p.classList.toggle('active', p.textContent === labels[tab])
  );
  destroyAllCharts();
  document.getElementById('analytics-content').innerHTML = skelHtml('overview');
  loadAnalyticsTab(tab);
}

async function loadAnalyticsTab(tab) {
  const el = document.getElementById('analytics-content');
  if (!el) return;
  try {
    switch (tab) {
      case 'a_overview': await loadAnalyticsOverview(el); break;
      case 'a_users':    await loadAnalyticsUsers(el); break;
      case 'a_features': await loadAnalyticsFeatures(el); break;

async function loadRetentionAction(action, btnEl) {
  // Update active button
  if (btnEl) {
    btnEl.parentElement.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
    btnEl.classList.add('active');
  }
  const wrap = document.getElementById('retention-action-wrap');
  if (!wrap) return;
  wrap.innerHTML = skelHtml('overview');

  try {
    const data = await api({ view: 'analytics_retention_action', action, threshold: 3, days: 30 });
    const cohorts = Array.isArray(data?.cohorts) ? data.cohorts : [];

    if (cohorts.length === 0) {
      wrap.innerHTML = emptyHtml('Not enough data for retention comparison');
      return;
    }

    const active = cohorts.find(c => c.cohort === 'active') || {};
    const control = cohorts.find(c => c.cohort === 'control') || {};

    const d7Better = (active.d7_pct || 0) > (control.d7_pct || 0);
    const d30Better = (active.d30_pct || 0) > (control.d30_pct || 0);

    wrap.innerHTML = `
      <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.75rem;">
        Comparing users with \u2265${data.threshold || 3} <strong style="color:var(--accent)">${escHtml(action)}</strong> in first 7 days vs rest
      </div>
      <div class="ret-compare">
        <div class="ret-compare-card">
          <div class="ret-compare-title">\u2B50 Active (${active.total_users || 0} users)</div>
          <div class="ret-compare-row"><span>Day 7</span><span class="${d7Better?'ret-compare-highlight':''}">${active.d7_pct || 0}%</span></div>
          <div class="ret-compare-row"><span>Day 30</span><span class="${d30Better?'ret-compare-highlight':''}">${active.d30_pct || 0}%</span></div>
        </div>
        <div class="ret-compare-card">
          <div class="ret-compare-title">Control (${control.total_users || 0} users)</div>
          <div class="ret-compare-row"><span>Day 7</span><span class="${!d7Better?'ret-compare-highlight':''}">${control.d7_pct || 0}%</span></div>
          <div class="ret-compare-row"><span>Day 30</span><span class="${!d30Better?'ret-compare-highlight':''}">${control.d30_pct || 0}%</span></div>
        </div>
      </div>
    `;
  } catch (err) {
    wrap.innerHTML = `<div class="error-box">${escHtml(err.message)}</div>`;
  }
}

async function loadAnalyticsHeatmap(el) {
  try {
    const data = await api({ view: 'analytics_heatmap', days: 30 });
    const cells = Array.isArray(data) ? data : [];

    // Build 7x24 grid
    const grid = {};
    let maxCount = 1;
    cells.forEach(c => {
      const key = `${c.day_of_week}_${c.hour}`;
      grid[key] = c;
      if (c.event_count > maxCount) maxCount = c.event_count;
    });

    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const dayOrder = [1,2,3,4,5,6,0]; // Mon first

    // Header row: empty + 24 hour labels
    let gridHtml = '<div class="heatmap-label"></div>';
    for (let h = 0; h < 24; h++) {
      gridHtml += `<div class="heatmap-label">${h}</div>`;
    }

    // Data rows
    dayOrder.forEach(dow => {
      gridHtml += `<div class="heatmap-label-row">${dayNames[dow]}</div>`;
      for (let h = 0; h < 24; h++) {
        const cell = grid[`${dow}_${h}`] || { event_count: 0, unique_users: 0 };
        const intensity = cell.event_count / maxCount;
        const level = intensity === 0 ? 0 : intensity < 0.25 ? 1 : intensity < 0.5 ? 2 : intensity < 0.75 ? 3 : 4;
        const colors = ['var(--card)','rgba(167,139,250,0.15)','rgba(167,139,250,0.35)','rgba(167,139,250,0.6)','rgba(167,139,250,0.9)'];
        gridHtml += `<div class="heatmap-cell" style="background:${colors[level]}" title="${dayNames[dow]} ${h}:00 — ${cell.event_count} events, ${cell.unique_users} users"></div>`;
      }
    });

    // Scale legend
    const scaleHtml = `<div class="heatmap-scale">
      <span>Less</span>
      <div class="heatmap-scale-cell" style="background:var(--card);border:1px solid var(--border)"></div>
      <div class="heatmap-scale-cell" style="background:rgba(167,139,250,0.15)"></div>
      <div class="heatmap-scale-cell" style="background:rgba(167,139,250,0.35)"></div>
      <div class="heatmap-scale-cell" style="background:rgba(167,139,250,0.6)"></div>
      <div class="heatmap-scale-cell" style="background:rgba(167,139,250,0.9)"></div>
      <span>More</span>
    </div>`;

    el.innerHTML = `
      <div class="section-title">Activity Heatmap (30 days)</div>
      <div class="card" style="padding:1.25rem;">
        <div class="heatmap-container">
          <div class="heatmap-grid">${gridHtml}</div>
        </div>
        ${scaleHtml}
      </div>
    `;
  } catch (err) {
    el.innerHTML = `<div class="error-box">${escHtml(err.message)}</div>`;
  }
}

async function loadAnalyticsAI(el) {
  try {
    const data = await api({ view: 'analytics_ai_perf', hours: S.hours });
    const services = Array.isArray(data?.services) ? data.services : [];
    const timeline = Array.isArray(data?.timeline) ? data.timeline : [];

    if (services.length === 0) {
      el.innerHTML = emptyHtml('No AI service data');
      return;
    }

    // Check for failures
    const totalReq = services.reduce((s, sv) => s + (sv.requests || 0), 0);
    const totalFail = services.reduce((s, sv) => s + (sv.failures || 0), 0);
    const failRate = totalReq > 0 ? (totalFail / totalReq * 100) : 0;
    let alertHtml = '';
    if (failRate > 10) {
      alertHtml = `<div class="ai-alert ai-alert-error">\u26A0 High failure rate: ${failRate.toFixed(1)}% of AI requests failing</div>`;
    } else if (failRate > 5) {
      alertHtml = `<div class="ai-alert ai-alert-warn">\u26A0 Elevated failure rate: ${failRate.toFixed(1)}%</div>`;
    }

    const metricsHtml = services.map(sv => {
      const name = sv.service.replace('ai_', '').replace(/_/g, ' ');
      const rateColor = sv.success_rate >= 95 ? 'var(--green)' : sv.success_rate >= 80 ? 'var(--yellow)' : 'var(--red)';
      return `
        <div class="analytics-metric card">
          <div class="metric-label">${escHtml(name)}</div>
          <div class="metric-value" style="color:${rateColor}">${sv.success_rate}%</div>
          <div class="metric-sub">${sv.successes}/${sv.requests} success &middot; ${sv.failures} failed</div>
          <div class="metric-sub" style="margin-top:4px;">\u23F1 ${sv.avg_response_sec}s avg</div>
        </div>`;
    }).join('');

    const chartHtml = timeline.length > 0 ? `<canvas id="aiTimelineChart" height="200"></canvas>` : '';

    el.innerHTML = `
      <div class="section-title">AI Performance (${S.hours >= 168 ? '7d' : S.hours + 'h'})</div>
      ${alertHtml}
      <div class="analytics-metric-grid">${metricsHtml}</div>
      ${chartHtml ? `
        <div class="section-title" style="margin-top:1.5rem;">AI Usage Timeline</div>
        <div class="card" style="padding:1rem;">${chartHtml}</div>
      ` : ''}
    `;

    // Render timeline chart
    if (timeline.length > 0) {
      destroyChart('aiTimelineChart');
      const canvas = document.getElementById('aiTimelineChart');
      if (canvas) {
        const labels = timeline.map(t => new Date(t.hour).toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'}));
        S.charts['aiTimelineChart'] = new Chart(canvas, {
          type: 'bar',
          data: {
            labels,
            datasets: [
              { label: 'Titles', data: timeline.map(t => t.titles), backgroundColor: 'rgba(251,191,36,0.6)', borderRadius: 3 },
              { label: 'Images', data: timeline.map(t => t.images), backgroundColor: 'rgba(167,139,250,0.6)', borderRadius: 3 },
              { label: 'Interpretations', data: timeline.map(t => t.interps), backgroundColor: 'rgba(52,211,153,0.6)', borderRadius: 3 },
            ],
          },
          options: { ...chartOptions('Count'), plugins: { ...chartOptions('Count').plugins, legend: { display: true, labels: { color: '#94a3b8', font: { size: 10 }, usePointStyle: true, boxWidth: 8 } } } },
        });
      }
    }
  } catch (err) {
    el.innerHTML = `<div class="error-box">${escHtml(err.message)}</div>`;
  }
}

    </div>
    <div class="card" style="padding:0; overflow:hidden;">
      <div style="max-height:600px;overflow-y:auto;">
        <table class="live-table">
          <thead><tr><th>Time</th><th>Event</th><th>Session</th><th>Device</th><th>Meta</th></tr></thead>
          <tbody id="live-tbody"></tbody>
        </table>
      </div>
    </div>
  `;

  await refreshLiveEvents(true);
  S.liveInterval = setInterval(() => refreshLiveEvents(false), 10000);
}

async function refreshLiveEvents(isFirst) {
  try {
    const data = await api({ view: 'analytics_live', limit: 50 });
    const events = Array.isArray(data) ? data : [];
    const tbody = document.getElementById('live-tbody');
    if (!tbody) return;

    const rows = events.map((e, i) => {
      const ts = new Date(e.created_at);
      const timeStr = ts.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
      const group = getEventGroup(e.event_type);
      const isNew = !isFirst && _liveLastId && e.id !== _liveLastId && i === 0;
      const metaStr = e.metadata ? JSON.stringify(e.metadata).slice(0, 60) : '';
      return `<tr class="${isNew ? 'live-row-new' : ''}">
        <td style="font-family:var(--mono);color:var(--text-dim);white-space:nowrap;">${timeStr}</td>
        <td><span class="live-event-dot" style="background:${group.color}"></span>${escHtml(e.event_type)}</td>
        <td style="font-family:var(--mono);color:var(--text-dim);">${escHtml(e.session_id || '')}</td>
        <td style="color:var(--text-muted);font-size:0.72rem;">${escHtml(e.device || '')}</td>
        <td style="font-size:0.68rem;color:var(--text-dim);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escHtml(metaStr)}">${escHtml(metaStr)}</td>
      </tr>`;
    }).join('');

    tbody.innerHTML = rows;
    if (events.length > 0) _liveLastId = events[0].id;
  } catch (err) {
    // Silently retry on next interval
  }
}

function toggleLive() {
  const btn = document.getElementById('live-toggle-btn');
  const header = document.querySelector('.live-header');
  if (S.liveInterval) {
    clearInterval(S.liveInterval);
    S.liveInterval = null;
    if (btn) btn.textContent = 'Resume';
    if (header) header.classList.add('live-paused');
  } else {
    refreshLiveEvents(false);
    S.liveInterval = setInterval(() => refreshLiveEvents(false), 10000);
    if (btn) btn.textContent = 'Pause';
    if (header) header.classList.remove('live-paused');
  }
}

function getEventGroup(eventType) {
  const prefix = eventType.split('_')[0];
  return EVENT_GROUPS[prefix] || DEFAULT_GROUP;
}

function formatGap(sec) {
  const s = parseFloat(sec);
  if (s < 60) return `${s.toFixed(1)}s`;
  if (s < 3600) return `${(s/60).toFixed(1)}m`;
  return `${(s/3600).toFixed(1)}h`;
}

// Store events data for popup clicks
let _sessionFlowEvents = [];

async function loadSessionTimeline(sessionId, rowEl) {
  // Highlight selected row
  document.querySelectorAll('.session-table tr').forEach(r => r.classList.remove('session-row-active'));
  if (rowEl) rowEl.classList.add('session-row-active');

  const wrap = document.getElementById('session-timeline-wrap');
  if (!wrap) return;
  wrap.innerHTML = skelHtml('overview');

  try {
    const data = await api({ view: 'analytics_user_flow', session_id: sessionId });
    const events = Array.isArray(data) ? data : [];
    _sessionFlowEvents = events;

    if (events.length === 0) {
      wrap.innerHTML = emptyHtml('No events in this session');
      return;
    }

    // Build visual flow diagram
    const nodesHtml = events.map((e, i) => {
      const group = getEventGroup(e.event_type);
      const ts = new Date(e.created_at);
      const timeStr = ts.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
      const displayName = e.event_type.replace(/_/g, ' ');

      // Arrow before node (except first)
      let arrowHtml = '';
      if (i > 0) {
        const gap = parseFloat(e.gap_sec) || 0;
        const gapStr = gap > 0 ? formatGap(gap) : '';
        const longGap = gap > 30 ? ' long-gap' : '';
        const lineColor = gap > 60 ? 'var(--yellow)' : gap > 30 ? 'var(--text-dim)' : 'var(--border)';
        arrowHtml = `<div class="flow-arrow">
          ${gapStr ? `<div class="flow-arrow-gap${longGap}">${gapStr}</div>` : ''}
          <div class="flow-arrow-line" style="background:${lineColor};"></div>
          <div class="flow-arrow-tip" style="border-left-color:${lineColor};"></div>
        </div>`;
      }

      const nodeHtml = `<div class="flow-node" style="border-color:${group.color}; background:${group.bg};" onclick="showFlowPopup(_sessionFlowEvents[${i}])" title="${escHtml(e.event_type)}">
        <div class="fn-index" style="background:${group.color};">${i + 1}</div>
        <div class="fn-icon">${group.icon}</div>
        <div class="fn-name" style="color:${group.color};">${escHtml(displayName)}</div>
        <div class="fn-time">${timeStr}</div>
      </div>`;

      return arrowHtml + nodeHtml;
    }).join('');

    // Duration
    const firstTs = new Date(events[0].created_at);
    const lastTs = new Date(events[events.length - 1].created_at);
    const durSec = (lastTs - firstTs) / 1000;
    const durStr = durSec < 60 ? `${durSec.toFixed(0)}s` : `${(durSec/60).toFixed(1)}m`;

    wrap.innerHTML = `
      <div class="section-title" style="margin-top:1.5rem;">
        Session Flow &middot; ${events.length} events &middot; ${durStr}
        <span style="font-size:0.72rem; color:var(--text-dim); margin-left:0.5rem;">(click node for details)</span>
      </div>
      <div class="card" style="padding:0.75rem; overflow:hidden;">
        <div class="flow-diagram" id="flow-diagram-scroll">
          ${nodesHtml}
        </div>
      </div>
    `;

    // Enable drag-to-scroll
    const diagram = document.getElementById('flow-diagram-scroll');
    if (diagram) {
      let isDown = false, startX, scrollLeft;
      diagram.addEventListener('mousedown', (e) => {
        if (e.target.closest('.flow-node')) return; // Don't hijack node clicks
        isDown = true; startX = e.pageX - diagram.offsetLeft; scrollLeft = diagram.scrollLeft;
      });
      diagram.addEventListener('mouseleave', () => isDown = false);
      diagram.addEventListener('mouseup', () => isDown = false);
      diagram.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - diagram.offsetLeft;
        diagram.scrollLeft = scrollLeft - (x - startX);
      });
    }
  } catch (err) {
    wrap.innerHTML = `<div class="error-box">${escHtml(err.message)}</div>`;
  }
}

async function loadFunnel(el) {
  const presetKey = S.funnelPreset || 'recording';
  const preset = FUNNEL_PRESETS[presetKey];

  const presetButtons = Object.entries(FUNNEL_PRESETS).map(([k, v]) =>
    `<button class="filter-pill${k === presetKey ? ' active' : ''}" onclick="setFunnelPreset('${k}')">${v.label}</button>`
  ).join('');

  // Show preset buttons immediately, then load data
  el.innerHTML = `
    <div class="section-title">Funnel Analysis (${S.hours >= 168 ? '7d' : S.hours + 'h'})</div>
    <div class="funnel-presets">${presetButtons}</div>
    <div id="funnel-data">${skelHtml('overview')}</div>
  `;

  try {
    const stepsParam = preset.steps.join(',');
    const data = await api({ view: 'analytics_funnel', steps: stepsParam, hours: S.hours });
    const steps = Array.isArray(data?.steps) ? data.steps : (Array.isArray(data) ? data : []);
    const funnelEl = document.getElementById('funnel-data');
    if (!funnelEl) return;

    if (steps.length === 0) {
      funnelEl.innerHTML = emptyHtml('No funnel data');
      return;
    }

    const maxSessions = steps[0]?.sessions || 1;
    const stepsHtml = steps.map((s, i) => {
      const pct = maxSessions > 0 ? ((s.sessions / maxSessions) * 100).toFixed(1) : 0;
      const ratePct = s.rate_pct ?? s.conversion_rate ?? 100;
      const dropPct = s.drop_off_pct ?? (i > 0 ? (100 - ratePct) : 0);
      const dropoff = i > 0 ? `<span class="funnel-dropoff">\u2193${parseFloat(dropPct).toFixed(0)}% drop</span>` : '';
      const hue = 263 - (i * 15); // purple gradient
      const label = s.event || s.step_name || `Step ${s.step}`;
      return `<div class="funnel-step">
        <div class="funnel-label">${escHtml(label)}</div>
        <div class="funnel-bar-wrap">
          <div class="funnel-bar" style="width:${Math.max(pct, 5)}%; background:hsl(${hue}, 70%, 60%);">
            ${s.sessions}
          </div>
        </div>
        <div class="funnel-stats">${ratePct}%${dropoff}</div>
      </div>`;
    }).join('');

    funnelEl.innerHTML = `
      <div class="card" style="padding:1.25rem;">
        ${stepsHtml}
      </div>
    `;
  } catch (err) {
    const funnelEl = document.getElementById('funnel-data');
    if (funnelEl) funnelEl.innerHTML = `<div class="error-box">${escHtml(err.message)}</div>`;
  }
}

}

    `<button class="filter-pill${k === preset ? ' active' : ''}" onclick="setFlowmapPreset('${k}')">${v.icon} ${v.label}</button>`
  ).join('');

  el.innerHTML = `
    <div class="section-title">User Flow Map (${S.hours >= 168 ? '7d' : S.hours + 'h'})</div>
    <div class="funnel-presets">${presetButtons}</div>
    <div class="flowmap-controls">
      <label>Min transitions:</label>
      <input type="range" id="fg-threshold" min="1" max="20" value="${preset === 'all' ? 2 : 1}" oninput="document.getElementById('fg-thresh-val').textContent=this.value">
      <span class="fc-value" id="fg-thresh-val">${preset === 'all' ? 2 : 1}</span>
      <button class="filter-pill" onclick="reloadFlowMap()" style="margin-left:0.5rem;">Apply</button>
    </div>
    <div id="flowgraph-wrap">${skelHtml('overview')}</div>
  `;
  await renderFlowMapData();
}

function setFlowmapPreset(key) {
  S.flowmapPreset = key;
  const el = document.getElementById('flows-content');
  if (el) loadFlowMap(el);
}

async function reloadFlowMap() {
  const wrap = document.getElementById('flowgraph-wrap');
  if (wrap) wrap.innerHTML = skelHtml('overview');
  await renderFlowMapData();
}

async function renderFlowMapData() {
  const wrap = document.getElementById('flowgraph-wrap');
  if (!wrap) return;

  try {
    const data = await api({ view: 'analytics_transitions', hours: S.hours, limit: 100 });
    const transitions = Array.isArray(data) ? data : [];

    if (transitions.length === 0) {
      wrap.innerHTML = emptyHtml('No transition data for flow map');
      return;
    }

    // Apply preset filter
    const preset = FLOWMAP_PRESETS[S.flowmapPreset || 'all'];
    let filtered = transitions;
    if (preset && preset.events) {
      const allowedSet = new Set(preset.events);
      filtered = transitions.filter(t =>
        allowedSet.has(t.from_event) && allowedSet.has(t.to_event)
      );
    }

    // Apply threshold filter
    const thresholdEl = document.getElementById('fg-threshold');
    const threshold = thresholdEl ? parseInt(thresholdEl.value) : 1;
    filtered = filtered.filter(t => (t.count || t.cnt || 0) >= threshold);

    if (filtered.length === 0) {
      const presetLabel = preset ? preset.label : 'selected';
      wrap.innerHTML = emptyHtml(`No flow data for "${presetLabel}". Try a different preset or lower the threshold.`);
      return;
    }

    renderFlowGraph(filtered, wrap);
  } catch (err) {
    wrap.innerHTML = `<div class="error-box">${escHtml(err.message)}</div>`;
  }
}

function renderFlowGraph(transitions, container) {
  // 1. Build dagre graph
  const g = new dagre.graphlib.Graph({ multigraph: true });
  g.setGraph({
    rankdir: 'TB',    // top-to-bottom
    nodesep: 40,
    ranksep: 70,
    edgesep: 20,
    marginx: 30,
    marginy: 30,
  });
  g.setDefaultEdgeLabel(() => ({}));

  // Collect nodes & edges
  const nodeSet = new Set();
  const maxCount = Math.max(...transitions.map(t => t.count || t.cnt || 1));
  transitions.forEach(t => {
    nodeSet.add(t.from_event);
    nodeSet.add(t.to_event);
  });

  // Compute node stats (total in + out)
  const nodeStats = {};
  nodeSet.forEach(n => { nodeStats[n] = { in: 0, out: 0 }; });
  transitions.forEach(t => {
    const c = t.count || t.cnt || 1;
    nodeStats[t.from_event].out += c;
    nodeStats[t.to_event].in += c;
  });

  // Add nodes with sizing based on traffic
  nodeSet.forEach(name => {
    const group = getEventGroup(name);
    const traffic = nodeStats[name].in + nodeStats[name].out;
    const displayName = name.replace(/_/g, ' ');
    // Wider for longer names
    const w = Math.max(130, displayName.length * 7.5 + 40);
    g.setNode(name, {
      label: displayName,
      width: w,
      height: 52,
      group: group,
      traffic: traffic,
      inCount: nodeStats[name].in,
      outCount: nodeStats[name].out,
    });
  });

  // Add edges
  transitions.forEach((t, i) => {
    if (t.from_event === t.to_event) return; // skip self-loops
    const c = t.count || t.cnt || 1;
    g.setEdge(t.from_event, t.to_event, {
      weight: c,
      count: c,
      // Line thickness: 1.5-6px based on relative count
      thickness: 1.5 + (c / maxCount) * 4.5,
    }, `e${i}`);
  });

  // Run layout
  dagre.layout(g);

  // 2. Compute SVG dimensions
  const graphInfo = g.graph();
  const svgW = (graphInfo.width || 600) + 60;
  const svgH = (graphInfo.height || 400) + 60;

  // 3. Render SVG
  container.innerHTML = '';
  const wrapper = document.createElement('div');
  wrapper.className = 'flowgraph-wrap';
  wrapper.style.maxHeight = '700px';
  container.appendChild(wrapper);

  // Tooltip
  const tooltip = document.createElement('div');
  tooltip.className = 'fg-tooltip';
  wrapper.appendChild(tooltip);

  const svg = d3.select(wrapper)
    .append('svg')
    .attr('width', svgW)
    .attr('height', svgH);

  // Defs: arrowheads
  const defs = svg.append('defs');
  // Create arrowheads for each event group color
  const usedColors = new Set();
  g.edges().forEach(e => {
    const srcGroup = getEventGroup(e.v);
    usedColors.add(srcGroup.color);
  });
  usedColors.forEach(color => {
    const id = 'arrow-' + color.replace('#', '');
    defs.append('marker')
      .attr('id', id)
      .attr('viewBox', '0 0 10 10')
      .attr('refX', 9)
      .attr('refY', 5)
      .attr('markerWidth', 8)
      .attr('markerHeight', 8)
      .attr('orient', 'auto-start-reverse')
      .append('path')
      .attr('d', 'M 0 0 L 10 5 L 0 10 Z')
      .attr('fill', color)
      .attr('class', 'fg-arrowhead')
      .attr('fill-opacity', 0.6);
  });

  // Draw edges
  const edgeGroup = svg.append('g');
  g.edges().forEach(e => {
    const edge = g.edge(e);
    const srcGroup = getEventGroup(e.v);
    const points = edge.points;
    const arrowId = 'arrow-' + srcGroup.color.replace('#', '');

    // Build curved path through points
    const line = d3.line()
      .x(d => d.x)
      .y(d => d.y)
      .curve(d3.curveBasis);

    edgeGroup.append('path')
      .attr('class', 'fg-edge')
      .attr('d', line(points))
      .attr('stroke', srcGroup.color)
      .attr('stroke-width', edge.thickness)
      .attr('marker-end', `url(#${arrowId})`)
      .on('mouseenter', function(event) {
        d3.select(this).attr('stroke-opacity', 0.8);
        tooltip.className = 'fg-tooltip visible';
        tooltip.innerHTML = `<strong style="color:${srcGroup.color}">${escHtml(e.v.replace(/_/g,' '))}</strong>
          <span style="color:var(--text-dim);margin:0 6px;">\u2192</span>
          <strong>${escHtml(e.w.replace(/_/g,' '))}</strong>
          <br><span style="color:var(--accent);font-family:var(--mono);">${edge.count}\u00d7</span>`;
      })
      .on('mousemove', function(event) {
        const rect = wrapper.getBoundingClientRect();
        tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
        tooltip.style.top = (event.clientY - rect.top - 14) + 'px';
      })
      .on('mouseleave', function() {
        d3.select(this).attr('stroke-opacity', 0.35);
        tooltip.className = 'fg-tooltip';
      });

    // Edge count label at midpoint
    const mid = points[Math.floor(points.length / 2)];
    edgeGroup.append('text')
      .attr('class', 'fg-edge-label')
      .attr('x', mid.x + 8)
      .attr('y', mid.y - 4)
      .text(edge.count);
  });

  // Draw nodes
  const nodeGroup = svg.append('g');
  g.nodes().forEach(name => {
    const node = g.node(name);
    const group = node.group;
    const ng = nodeGroup.append('g')
      .attr('class', 'fg-node-box')
      .attr('transform', `translate(${node.x - node.width/2}, ${node.y - node.height/2})`)
      .on('mouseenter', function(event) {
        // Highlight connected edges
        edgeGroup.selectAll('.fg-edge').attr('stroke-opacity', function() {
          const path = d3.select(this);
          return 0.08;
        });
        g.edges().forEach(e => {
          if (e.v === name || e.w === name) {
            // Can't easily select by data, re-highlight in a simpler way
          }
        });
        tooltip.className = 'fg-tooltip visible';
        tooltip.innerHTML = `<strong style="color:${group.color}">${group.icon} ${escHtml(node.label)}</strong>
          <br><span style="color:var(--text-muted)">In:</span> <span style="font-family:var(--mono)">${node.inCount}</span>
          <span style="color:var(--text-muted); margin-left:8px">Out:</span> <span style="font-family:var(--mono)">${node.outCount}</span>`;
      })
      .on('mousemove', function(event) {
        const rect = wrapper.getBoundingClientRect();
        tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
        tooltip.style.top = (event.clientY - rect.top - 14) + 'px';
      })
      .on('mouseleave', function() {
        edgeGroup.selectAll('.fg-edge').attr('stroke-opacity', 0.35);
        tooltip.className = 'fg-tooltip';
      });

    // Background rect
    ng.append('rect')
      .attr('width', node.width)
      .attr('height', node.height)
      .attr('rx', 10)
      .attr('ry', 10)
      .attr('fill', group.bg)
      .attr('stroke', group.color)
      .attr('stroke-width', 2);

    // Icon
    ng.append('text')
      .attr('x', 14)
      .attr('y', node.height / 2)
      .attr('dy', '0.35em')
      .attr('font-size', '1rem')
      .text(group.icon);

    // Label
    ng.append('text')
      .attr('x', 32)
      .attr('y', node.height / 2)
      .attr('dy', '0.35em')
      .attr('font-size', '0.72rem')
      .attr('font-weight', '600')
      .attr('fill', group.color)
      .text(node.label);

    // Traffic badge (top-right)
    const total = node.inCount + node.outCount;
    if (total > 0) {
      const badgeW = String(total).length * 7 + 12;
      ng.append('rect')
        .attr('x', node.width - badgeW - 6)
        .attr('y', 6)
        .attr('width', badgeW)
        .attr('height', 18)
        .attr('rx', 9)
        .attr('fill', group.color)
        .attr('fill-opacity', 0.25);
      ng.append('text')
        .attr('x', node.width - badgeW/2 - 6)
        .attr('y', 15)
        .attr('dy', '0.35em')
        .attr('text-anchor', 'middle')
        .attr('font-size', '0.6rem')
        .attr('font-weight', '700')
        .attr('font-family', 'var(--mono)')
        .attr('fill', group.color)
        .text(total);
    }
  });

  // Legend
  const usedGroups = {};
  nodeSet.forEach(n => {
    const gr = getEventGroup(n);
    if (!usedGroups[gr.label]) usedGroups[gr.label] = gr;
  });
  const legendHtml = Object.entries(usedGroups).map(([label, gr]) =>
    `<div class="fg-legend-item"><div class="fg-legend-dot" style="background:${gr.color}"></div>${gr.icon} ${label}</div>`
  ).join('');

  const legendDiv = document.createElement('div');
  legendDiv.className = 'fg-legend';
  legendDiv.innerHTML = legendHtml;
  wrapper.appendChild(legendDiv);
}

      el.innerHTML = emptyHtml('No users found');

    }

      const cost = parseFloat(u.total_cost_usd || 0);

        <td><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${group.color};margin-right:4px;vertical-align:middle;"></span><span class="code-cell" style="font-size:0.75rem;">${escHtml(u.last_event_type || '-')}</span></td>

        </div>
      ` : ''}
    `;
  } catch (err) {
    el.innerHTML = `<div class="error-box">${escHtml(err.message)}</div>`;
  }
}

function usersPage(offset) {
  S.usersOffset = Math.max(0, offset);
  loadUsers();
}

let _userSearchTimeout = null;
function onUserSearch(query) {
  clearTimeout(_userSearchTimeout);
  _userSearchTimeout = setTimeout(() => {
    const q = query.toLowerCase().trim();
    document.querySelectorAll('.user-table tbody tr').forEach(row => {
      const uid = (row.dataset.uid || '').toLowerCase();
      row.style.display = (!q || uid.includes(q)) ? '' : 'none';
    });
  }, 150);
}

function selectUser(userId) {
  S.usersTab = 'u_detail';
  S.usersSelectedId = userId;

}

function backToUserList() {
  S.usersTab = 'u_list';

}

            · ✨ $${parseFloat(costs.title_cost||0).toFixed(4)}
            · 💭 $${parseFloat(costs.interpretation_cost||0).toFixed(4)}
            · 🎙 $${parseFloat(costs.transcription_cost||0).toFixed(4)}
          </div>
        </div>
      </div>

      <div class="user-stat-card" style="margin-bottom:1rem;">
        <div class="usc-label">App Info</div>
        <div class="usc-sub" style="font-size:0.82rem;">
          📱 ${escHtml(devices.length > 0 ? devices[0].device || '-' : '-')}
          · v${escHtml(b.app_version || '-')}
          · ${escHtml(b.os_version || '-')}
          · 🌐 ${escHtml(b.locale || '-')}
          · ⏰ Most active: ${profile.active_hour != null ? String(profile.active_hour).padStart(2,'0') + ':00' : '-'}
        </div>
      </div>

      ${dailyData.length > 0 ? `
        <div class="chart-wrapper">
          <div class="card chart-card">
            <div class="chart-title">Activity (Last 30 Days)</div>
            <canvas id="userActivityChart"></canvas>
          </div>
        </div>
      ` : ''}

      ${breakdown.length > 0 ? `
        <div class="chart-wrapper">
          <div class="card chart-card">
            <div class="chart-title">Event Type Breakdown</div>
            <canvas id="userBreakdownChart"></canvas>
          </div>
        </div>
      ` : ''}

      ${emotions.length > 0 ? `
        <div class="section-title" style="margin-top:1.5rem;">Top Emotions</div>
        <div class="card" style="padding:1rem;margin-bottom:1.5rem;">${emotionBars}</div>
      ` : ''}

      <div class="section-title" style="margin-top:1.5rem;">Recent Events <span style="color:var(--text-muted);font-weight:400;font-size:0.82rem;">(${evTotal} total)</span></div>
      <div class="table-wrap"><table class="live-table">
        <thead><tr><th>Time</th><th>Event</th><th>Session</th><th>Device</th><th>Metadata</th></tr></thead>
        <tbody>${eventRows.length > 0 ? eventRows : '<tr><td colspan="5" style="text-align:center;color:var(--text-dim);">No events</td></tr>'}</tbody>
      </table></div>
      ${evTotal > 50 ? `
        <div id="user-events-pagination" class="user-pagination">
          <button disabled>← Prev</button>
          <span style="color:var(--text-muted);font-size:0.78rem;">Page 1 of ${Math.ceil(evTotal / 50)}</span>
          <button onclick="loadUserEventsPage(50)">Next →</button>
        </div>
      ` : ''}
    `;

    // Render charts
    if (dailyData.length > 0) {
      renderAnalyticsChart('userActivityChart', 'userActivity',
        dailyData.map(d => { const dt = new Date(d.day); return dt.toLocaleDateString('en-GB', {day:'2-digit',month:'short'}); }),
        dailyData.map(d => d.count),
        'Events'
      );
    }
    if (breakdown.length > 0) {
      renderAnalyticsChart('userBreakdownChart', 'userBreakdown',
        breakdown.map(b => b.event_type),
        breakdown.map(b => b.count),
        'Count'
      );
    }
  } catch (err) {
    el.innerHTML = `<button class="user-back-btn" onclick="backToUserList()">← Back to Users</button><div class="error-box">${escHtml(err.message)}</div>`;
  }
}

function goToSessionFlow(sessionId) {
  if (!sessionId) return;
  S.flowsTab = 'f_sessions';
  navigate('flows');
  setTimeout(() => {
    const el = document.getElementById('view-flows');
    if (el) loadSessionTimeline(sessionId, null);
  }, 300);
}

async function loadUserEventsPage(offset) {
  const wrap = document.getElementById('user-events-pagination');
  if (!wrap) return;
  try {
    const data = await api({ view: 'analytics_user_events', user_id: S.usersSelectedId, hours: 168, limit: 50, offset });
    const evList = Array.isArray(data?.events) ? data.events : [];
    const evTotal = data?.total || 0;
    const totalPages = Math.ceil(evTotal / 50);
    const currentPage = Math.floor(offset / 50) + 1;

    const tbody = document.querySelector('#view-users .live-table tbody');
    if (tbody) {
      tbody.innerHTML = evList.map(ev => {
        const group = getEventGroup(ev.event_type || '');
        const meta = ev.metadata ? JSON.stringify(ev.metadata).slice(0, 60) : '';
        return `<tr>
          <td style="font-family:var(--mono);font-size:0.75rem;white-space:nowrap;">${formatMSK(ev.created_at)}</td>
          <td><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${group.color};margin-right:5px;vertical-align:middle;"></span>${escHtml(ev.event_type)}</td>
          <td><span class="user-uid" style="cursor:pointer;font-size:0.75rem;" onclick="event.stopPropagation();goToSessionFlow('${ev.session_id}')">${escHtml(ev.session_id_short || '-')}</span></td>
          <td style="font-size:0.75rem;color:var(--text-muted);">${escHtml(ev.device || '-')}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.72rem;color:var(--text-dim);" title="${escHtml(meta)}">${escHtml(meta)}</td>
        </tr>`;
      }).join('');
    }

    wrap.innerHTML = `
      <button ${currentPage <= 1 ? 'disabled' : ''} onclick="loadUserEventsPage(${offset - 50})">← Prev</button>
      <span style="color:var(--text-muted);font-size:0.78rem;">Page ${currentPage} of ${totalPages}</span>
      <button ${currentPage >= totalPages ? 'disabled' : ''} onclick="loadUserEventsPage(${offset + 50})">Next →</button>
    `;
  } catch (err) { /* silent */ }
}

/* ================================================================
   Admin Init
   ================================================================ */

function initAdmin() {
  buildTimePills();
  buildCatDropdown();
  buildCodeDropdown([]);

  // Hash routing
  const hash = location.hash.replace('#', '') || 'overview';
  const validViews = ['overview', 'errors', 'trends', 'devices', 'analytics', 'flows', 'users'];
  S.view = validViews.includes(hash) ? hash : 'overview';

  // Parse URL params for initial filters
  const params = new URLSearchParams(location.search);
  if (params.get('category')) { S.category = params.get('category'); buildCatDropdown(); }
  if (params.get('code')) { S.code = params.get('code'); }
  if (params.get('hours')) { S.hours = parseInt(params.get('hours')) || 24; buildTimePills(); }

  navigate(S.view);
  setupAutoRefresh();
}

/* ================================================================
   Global Init
   ================================================================ */

function init() {
  if (isLoggedIn()) {
    showAdminView();
  } else {
    showPublicView();
  }
}

window.addEventListener('hashchange', () => {
  if (S.mode !== 'admin') return;
  const hash = location.hash.replace('#', '') || 'overview';
  const validViews = ['overview', 'errors', 'trends', 'devices', 'analytics', 'flows', 'users'];
  if (validViews.includes(hash) && hash !== S.view) {
    navigate(hash);
  }
});

init();
</script>
